events {
    worker_connections 1024;
}

http {
    
    upstream datapasien {
        server datapasien-service:8000;
    }

    upstream jadwaldokter {
        server jadwaldokter-service:8000;
    }

    upstream farmasi {
        server service-farmasi:8000;
    }

    
    server {
        listen 80;

        
        location /health {
            return 200 'API Gateway OK';
            add_header Content-Type text/plain;
        }

        
        location /api/v1/patients {
            proxy_pass http://datapasien;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

       
        location /api/v1/schedules {
            proxy_pass http://jadwaldokter;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        
        location /api/v1/prescriptions {
            proxy_pass http://farmasi;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        
        location / {
            return 404 '{"error": "Route tidak ditemukan"}';
            add_header Content-Type application/json;
        }
    }
}