version: '3.8'
services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=local
      - APP_KEY=base64:CJ24da6kPL6HYLMQlvwa/nHh7zQTAme4gZ2lpWGqGVg=
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=patient_service
      - DB_USERNAME=root
      - DB_PASSWORD=root
      - API_KEY=102022430029
    depends_on:
      - db
    volumes:
      - .:/var/www

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: patient_service
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: